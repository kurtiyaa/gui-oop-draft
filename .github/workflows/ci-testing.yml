name: ci-testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "liberica"
          cache: "maven"

      - name: Build and verify
        run: |
          chmod +x mvnw
          ./mvnw clean verify -B -ntp -V

      - name: Upload JaCoCo XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: warn
